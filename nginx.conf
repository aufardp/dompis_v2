# ============================================================
# Nginx Reverse Proxy — Dompis v2 (Behind Certbot SSL)
# Place this in: /etc/nginx/sites-available/dompis.ta-branchsby.co.id
# Symlink to:    /etc/nginx/sites-enabled/dompis.ta-branchsby.co.id
# ============================================================

# ── HTTP → HTTPS redirect ──────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name dompis.ta-branchsby.co.id;

    # Certbot webroot for HTTP-01 challenge (auto-renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS (SSL terminated here, proxy to Docker) ──────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dompis.ta-branchsby.co.id;

    # ── SSL certificates (Certbot-managed) ────────────────
    ssl_certificate     /etc/letsencrypt/live/dompis.ta-branchsby.co.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dompis.ta-branchsby.co.id/privkey.pem;

    # Modern SSL config
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Security headers ─────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # ── Proxy to Docker container (port 3000) ────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # ★ CRITICAL: These headers prevent Next.js redirect loops ★
        proxy_set_header X-Forwarded-Proto  $scheme;       # tells Next.js "this is https"
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host   $host;
        proxy_set_header X-Forwarded-Port   $server_port;
        proxy_set_header Host               $host;

        # WebSocket support (needed for Next.js HMR in dev mode)
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         "upgrade";

        # Timeouts for long-running requests
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Disable buffering for streaming responses
        proxy_buffering off;
    }
}
