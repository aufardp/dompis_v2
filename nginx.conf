upstream dompis_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

# ── Cloudflare Real IP ─────────────────────────────────────────────────────
# Restore real visitor IP from Cloudflare headers
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 2400:cb00::/32;
real_ip_header CF-Connecting-IP;

# ── Rate Limiting ───────────────────────────────────────────────────────────
# Limit login attempts to prevent brute force
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

server {
    listen 80;
    server_name dompis.telkomakses-area3.id;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript application/x-javascript
               text/xml application/xml application/xml+rss image/svg+xml
               application/x-font-woff font/woff font/woff2;

    # ── Static Files MIME Types ───────────────────────────────────────────
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Login Rate Limit ───────────────────────────────────────────────────
    location /api/auth/login {
        limit_req zone=login_limit burst=3 nodelay;
        proxy_pass http://dompis_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache off;
    }

    # ── _next/static/ (immutable, 1 year) ──────────────────────────────────
    # Chunk hashes tidak berubah antar build yang sama
    location /_next/static/ {
        proxy_pass http://dompis_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;

        proxy_cache_valid 200 31536000s;
        expires 31536000s;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Cache-Status "HIT" always;

        access_log off;
    }

    # ── SSE / Event Stream ────────────────────────────────────────────────
    location /api/tickets/events {
        proxy_pass http://dompis_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Accept "text/event-stream";
        proxy_set_header Host $host;
        proxy_set_header Cache-Control "no-cache, no-store";
        proxy_set_header X-Accel-Buffering "no";

        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_buffering off;
        proxy_read_timeout 86400;
        proxy_send_timeout 300;
    }

    # ── API routes ───────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://dompis_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Cache-Control "no-store, no-cache, must-revalidate";
        proxy_cache off;
        proxy_cache_bypass $cookie_token;
        proxy_no_cache $cookie_token;
    }

    # ── HTML pages (no cache) ────────────────────────────────────────────
    location ~* \.(html|htm)$ {
        proxy_pass http://dompis_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;

        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        expires 0;
        proxy_cache off;
    }

    # ── All other routes (React pages) ───────────────────────────────────
    location / {
        proxy_pass http://dompis_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Cache-Control "no-store, no-cache, must-revalidate";
        proxy_cache off;
    }

    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}