services:
  mysql:
    image: mariadb:11
    container_name: dompis_mysql
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: dompis_db
      MARIADB_USER: dompis_user
      MARIADB_PASSWORD: dompis_password
    ports:
      - '3307:3306'
    volumes:
      - dompis_mysql_data:/var/lib/mysql
    networks:
      - dompis-network
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:latest
    container_name: dompis_redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - dompis_redis_data:/data
    networks:
      - dompis-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: dompis_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: dompis_user
      PMA_PASSWORD: dompis_password
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - '8081:80'
    depends_on:
      - mysql
    networks:
      - dompis-network

volumes:
  dompis_mysql_data:
    driver: local
  dompis_redis_data:
    driver: local

networks:
  dompis-network:
    driver: bridge
