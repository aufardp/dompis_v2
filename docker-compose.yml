version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: dompis_mysql
    restart: unless-stopped
    mem_limit: 512m
    command: >
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=64M
      --max-connections=50
      --wait-timeout=30
      --interactive-timeout=30
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: dompis_db
      MYSQL_USER: dompis_user
      MYSQL_PASSWORD: dompis_password
    ports:
      - '3307:3306'
    volumes:
      - dompis_mysql_data:/var/lib/mysql
    networks:
      - dompis-network
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 20s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dompis_redis
    restart: unless-stopped
    mem_limit: 128m
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    ports:
      - '6380:6379'
    volumes:
      - dompis_redis_data:/data
    networks:
      - dompis-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: dompis_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: dompis_user
      PMA_PASSWORD: dompis_password
    ports:
      - '8081:80'
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - dompis-network

  n8n:
    image: n8nio/n8n:latest
    container_name: dompis_n8n
    restart: always
    ports:
      - '5678:5678'
    environment:
      DB_TYPE: mysqldb
      DB_MYSQLDB_HOST: mysql
      DB_MYSQLDB_PORT: 3306
      DB_MYSQLDB_DATABASE: dompis_db
      DB_MYSQLDB_USER: dompis_user
      DB_MYSQLDB_PASSWORD: dompis_password

      N8N_HOST: engingeng.optimusakses.org
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: https://engingeng.optimusakses.org/
      TZ: Asia/Jakarta

      N8N_ENABLE_FILESYSTEM_ACCESS: 'true'
      N8N_FILESYSTEM_ALLOW_PATHS: /data
      N8N_DEFAULT_BINARY_DATA_MODE: filesystem

    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - dompis_n8n_data:/home/node/.n8n
      - ./public/uploads:/data/uploads
    networks:
      - dompis-network

volumes:
  dompis_mysql_data:
  dompis_redis_data:
  dompis_n8n_data:

networks:
  dompis-network:
    driver: bridge
